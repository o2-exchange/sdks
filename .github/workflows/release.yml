name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  create-releases:
    name: Create GitHub Releases
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python: ${{ steps.detect.outputs.python }}
      typescript: ${{ steps.detect.outputs.typescript }}
      rust: ${{ steps.detect.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: knope-dev/action@v2.1.2
        with:
          version: 0.22.4
      - name: Create releases
        run: knope release --verbose
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Detect which packages were released
        id: detect
        run: |
          # Check which tags knope just created
          git fetch --tags
          for pkg in python typescript rust; do
            tag=$(git tag --sort=-creatordate | grep "^sdk-${pkg}/v" | head -1)
            # Tag points to HEAD means it was just created in this run
            if [ -n "$tag" ] && [ "$(git rev-list -1 "$tag")" = "$(git rev-parse HEAD)" ]; then
              echo "${pkg}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${pkg}=false" >> "$GITHUB_OUTPUT"
            fi
          done

  publish-python:
    name: Publish Python SDK
    needs: create-releases
    if: needs.create-releases.outputs.python == 'true'
    runs-on: ubuntu-latest
    environment:
      name: deploy-pypi
      url: https://pypi.org/p/o2-sdk
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v6
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/

  publish-typescript:
    name: Publish TypeScript SDK
    needs: create-releases
    if: needs.create-releases.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    environment: deploy-npm
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
          node-version: 24
      - run: sudo npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public

  publish-rust:
    name: Publish Rust SDK
    needs: create-releases
    if: needs.create-releases.outputs.rust == 'true'
    runs-on: ubuntu-latest
    environment: deploy-cargo
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
