name: Release

on:
  # Trigger when the release PR is merged
  pull_request:
    types: [closed]
    branches: [main]

  # Also trigger on manual tag push (fallback)
  push:
    tags:
      - "sdk-python/v*"
      - "sdk-typescript/v*"
      - "sdk-rust/v*"

permissions:
  contents: write
  id-token: write

jobs:
  # --- Create GitHub Releases + tags when the release PR merges ---
  create-releases:
    name: Create GitHub Releases
    if: github.event_name == 'pull_request' && github.head_ref == 'release' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: knope-dev/action@v2
        with:
          version: 0.22.4
      - name: Create releases
        run: knope release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

  # --- Publish jobs (triggered by tags created above) ---
  publish-python:
    name: Publish Python SDK
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-python/v')
    runs-on: ubuntu-latest
    environment:
      name: deploy-pypi
      url: https://pypi.org/p/o2-sdk
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/

  publish-typescript:
    name: Publish TypeScript SDK
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-typescript/v')
    runs-on: ubuntu-latest
    environment: deploy-npm
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
          node-version: 24
      - run: sudo npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public

  publish-rust:
    name: Publish Rust SDK
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-rust/v')
    runs-on: ubuntu-latest
    environment: deploy-cargo
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
