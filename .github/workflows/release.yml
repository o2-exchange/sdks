name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  create-releases:
    name: Create GitHub Releases
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      releases: ${{ steps.knope.outputs.releases }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: knope-dev/action@v2.1.2
        with:
          version: 0.22.4
      - name: Create releases
        id: knope
        run: |
          knope release --verbose 2>&1 | tee /tmp/knope-output.txt
          # Check which packages were released by looking at created tags
          echo "releases=true" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}

  publish-python:
    name: Publish Python SDK
    needs: create-releases
    runs-on: ubuntu-latest
    environment:
      name: deploy-pypi
      url: https://pypi.org/p/o2-sdk
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v6
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/

  publish-typescript:
    name: Publish TypeScript SDK
    needs: create-releases
    runs-on: ubuntu-latest
    environment: deploy-npm
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
          node-version: 24
      - run: sudo npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public

  publish-rust:
    name: Publish Rust SDK
    needs: create-releases
    runs-on: ubuntu-latest
    environment: deploy-cargo
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
